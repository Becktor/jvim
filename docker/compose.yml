services:
  nvim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NVIM_CONFIG_REPO: ${NVIM_CONFIG_REPO:-https://github.com/Becktor/dev-env.git}
        NVIM_CONFIG_BRANCH: ${NVIM_CONFIG_BRANCH:-main}
    image: jvim:latest
    container_name: jvim
    hostname: nvim-docker
    stdin_open: true
    tty: true

    volumes:
      # Persist plugin data between runs
      - nvim-data:/home/nvim/.local/share/nvim

      # Mount nvim config from dotfiles (editable at runtime)
      - ${NVIM_CONFIG_PATH:-~/git/dotfiles/dev-env/nvim}:/home/nvim/.config/nvim

      # Mount workspace/projects
      - ${WORKSPACE:-~/projects}:/home/nvim/workspace

      # Mount SSH keys for git operations (optional)
      # - ${SSH_DIR:-~/.ssh}:/home/nvim/.ssh:ro

      # Mount git config (optional - uncomment if ~/.gitconfig exists)
      # - ${GITCONFIG:-~/.gitconfig}:/home/nvim/.gitconfig:ro

    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - TERM=xterm-256color
      - COLORTERM=truecolor

    working_dir: /home/nvim/workspace

volumes:
  nvim-data:
    name: jvim-data
